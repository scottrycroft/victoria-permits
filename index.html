<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victoria Permit Applications</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Redirect hashbang URLs (e.g. /victoria-permits/#!/p/Sooke/PLN01660)
         to clean paths (e.g. /victoria-permits/p/Sooke/PLN01660).
         This enables SPA deep-linking on static hosts like GitHub Pages. -->
    <script>
      (function () {
        var hash = window.location.hash;
        if (hash && hash.startsWith('#!/')) {
          var path = hash.slice(2); // strip #! → /p/Sooke/PLN01660
          history.replaceState(null, '', window.location.pathname.replace(/\/$/, '') + path);
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
